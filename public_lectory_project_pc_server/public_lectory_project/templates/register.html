{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<section class="form-section">
    <h1>Регистрация на лекцию</h1>
    <form method="post" class="form-card">
        <label>ФИО
            <input type="text" name="full_name" placeholder="Введите ФИО">
        </label>
        <label>Возрастная группа
            <select name="age_group">
                <option value="">Выберите</option>
                <option>14–17</option>
                <option>18–25</option>
                <option>25–55</option>
                <option>55+</option>
            </select>
        </label>
        <label>Email
            <input type="email" name="email" placeholder="example@mail.ru">
        </label>
        <label>Формат участия
            <select name="participation_format">
                <option value="">Выберите</option>
                <option>Очно</option>
                <option>Онлайн</option>
            </select>
        </label>
        <label>Лекция
            <select name="lecture_id">
                <option value="">Выберите лекцию</option>
                {% for lecture in lectures %}
                <option value="{{ lecture.id }}">{{ lecture.title }} — {{ lecture.lecture_date }} {{ lecture.lecture_time }}</option>
                {% endfor %}
            </select>
        </label>
        <button class="btn" type="submit">Отправить заявку</button>
    </form>
</section>
{% endblock %}
