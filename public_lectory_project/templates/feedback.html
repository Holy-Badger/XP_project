{% extends 'base.html' %}
{% block title %}Отзывы{% endblock %}
{% block content %}
<section class="form-section">
    <h1>Обратная связь</h1>
    <form method="post" class="form-card">
        <label>Ваше имя
            <input type="text" name="listener_name" placeholder="Введите имя">
        </label>
        <label>Лекция
            <select name="lecture_id">
                <option value="">Выберите лекцию</option>
                {% for lecture in lectures %}
                <option value="{{ lecture.id }}">{{ lecture.title }}</option>
                {% endfor %}
            </select>
        </label>
        <label>Оценка
            <select name="rating">
                <option value="">Выберите</option>
                <option value="5">5</option>
                <option value="4">4</option>
                <option value="3">3</option>
                <option value="2">2</option>
                <option value="1">1</option>
            </select>
        </label>
        <label>Комментарий
            <textarea name="comment" rows="5" placeholder="Что можно улучшить?"></textarea>
        </label>
        <button class="btn" type="submit">Отправить отзыв</button>
    </form>
</section>
{% endblock %}
